version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
  - package-ecosystem: npm
    directory: /daemon
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(daemon)"
