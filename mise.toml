[tools]
node = "23.11.1"
bun = "1.3.10"

[tasks.daemon]
alias = "d"
description = "Start the WhatsApp daemon (compiled binary)"
dir = "{{cwd}}/daemon"
run = "./whatsapp-bookmark"

[tasks."daemon:dev"]
description = "Start the daemon with bun (for development)"
dir = "{{cwd}}/daemon"
run = "bun run index.js"

[tasks."daemon:auth"]
description = "Fresh auth — wipes credentials, shows QR code"
dir = "{{cwd}}/daemon"
run = "rm -rf auth_info contacts.json && ./whatsapp-bookmark"

[tasks."daemon:build"]
description = "Compile the daemon into a standalone binary"
dir = "{{cwd}}/daemon"
run = "bun build --compile --minify index.js --outfile whatsapp-bookmark"

[tasks.install]
description = "Install all dependencies"
run = [
  "npm install",
  "cd daemon && npm install",
]

[tasks.dev]
description = "Start Raycast extension in dev mode"
run = "npm run dev"

[tasks.lint]
description = "Lint the Raycast extension"
run = "npm run lint"

[tasks."daemon:enable"]
description = "Install and start the daemon as a login service (launchd)"
run = '''
DAEMON_PATH="$(cd daemon && pwd)/whatsapp-bookmark"
DAEMON_DIR="$(cd daemon && pwd)"
PLIST=~/Library/LaunchAgents/com.whatsapp-bookmark.daemon.plist

cat > "$PLIST" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>Label</key>
    <string>com.whatsapp-bookmark.daemon</string>
    <key>ProgramArguments</key>
    <array>
        <string>$DAEMON_PATH</string>
    </array>
    <key>WorkingDirectory</key>
    <string>$DAEMON_DIR</string>
    <key>RunAtLoad</key>
    <true/>
    <key>KeepAlive</key>
    <true/>
    <key>StandardOutPath</key>
    <string>/tmp/whatsapp-bookmark-daemon.log</string>
    <key>StandardErrorPath</key>
    <string>/tmp/whatsapp-bookmark-daemon.log</string>
</dict>
</plist>
EOF

launchctl load "$PLIST"
echo "daemon enabled — will start on login and restart if it crashes"
'''

[tasks."daemon:disable"]
description = "Stop and uninstall the daemon login service"
run = [
  "launchctl unload ~/Library/LaunchAgents/com.whatsapp-bookmark.daemon.plist",
  "rm ~/Library/LaunchAgents/com.whatsapp-bookmark.daemon.plist",
]

[tasks."daemon:logs"]
description = "Tail the daemon logs"
run = "tail -f /tmp/whatsapp-bookmark-daemon.log"
